<!DOCTYPE html>
<html>
<head>
  <title>Life is Strange Call</title>
  <link rel="icon" type="image/png" href="/assets/icons/Adobe%20Express%20-%20file.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #5f6f83 0%, #516175 100%);
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: url('/assets/cursor/Cursor%20LiS/Arrow.cur'), auto;
    }

    /* Header */
    .header {
      background: #6a7a8e;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #7d8d9e;
      flex-shrink: 0;
      position: relative;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
    }

    .header .logo {
      height: 90px;
      object-fit: contain;
    }

    .connection-status {
      position: absolute;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #888;
    }

    .status-dot.connected {
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }

    /* App Layout */
    .app-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .app-container::before {
      content: '';
      position: absolute;
      right: 360px;
      bottom: 90px;
      width: 260px;
      height: 260px;
      background: url('/assets/sticker/pngaaa.com-65825.png') center/contain no-repeat;
      opacity: 0.45;
      pointer-events: none;
      z-index: 3;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
      min-width: 0;
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
    }

    /* Video Grid */
    .video-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 16px;
      min-height: 200px;
      overflow: auto;
    }

    .video-container {
      position: relative;
      background: #4a5a6e;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
      border: 2px solid #7d8d9e;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      transition: border-color 0.2s;
    }

    .video-container:hover {
      border-color: #e94560;
    }

    /* User Tile (Audio-only User wie bei Discord) */
    .user-tile {
      position: relative;
      background: linear-gradient(135deg, #6a7a8e 0%, #7a8a9e 100%);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 1/1;
      min-width: 150px;
      max-width: 200px;
      border: 2px solid #7d8d9e;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      transition: border-color 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .user-tile:hover {
      border-color: #e94560;
      transform: scale(1.02);
    }

    .user-tile.speaking {
      border-color: #4ade80;
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
    }

    .user-tile .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #7d8d9e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 600;
      color: #fff;
      text-transform: uppercase;
    }

    .user-tile .username {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }

    .user-tile .status-icons {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
    }

    .user-tile .status-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-tile .status-icon svg {
      width: 16px;
      height: 16px;
      fill: #fff;
    }

    .user-tile .status-icon.muted svg {
      fill: #e94560;
    }

    .user-tile .speaking-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #4ade80;
      opacity: 0;
      animation: speakingPulse 1.5s ease-out infinite;
    }

    .user-tile.speaking .speaking-ring {
      opacity: 1;
    }

    @keyframes speakingPulse {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
    }

    .video-container:fullscreen {
      border-radius: 0;
      border: none;
    }

    .video-container .fullscreen-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .video-container:hover .fullscreen-hint {
      opacity: 1;
    }

    .video-container:fullscreen .fullscreen-hint,
    .video-container:fullscreen .label,
    .video-container:fullscreen .volume-control {
      display: none;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .video-container .label {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .video-container .label .audio-hint {
      margin-left: 4px;
      font-size: 12px;
    }

    /* Volume Control - removed, using context menu instead */
    .video-container .label .speaking-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
    }

    .video-container .label .speaking-indicator.active {
      background: #4ade80;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Chat Sidebar */
    .chat-sidebar {
      width: 320px;
      background: rgba(67, 81, 99, 0.9);
      border-left: 1px solid #7d8d9e;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(6px);
    }

    /* Participants Panel */
    .participants-panel {
      border-bottom: 1px solid #7d8d9e;
      max-height: 200px;
      overflow-y: auto;
    }

    .participants-header {
      padding: 12px 16px;
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .participants-header .count {
      background: #e94560;
      color: #fff;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 10px;
    }

    .participant-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      transition: background 0.2s;
    }

    .participant-item:hover {
      background: #7a8a9e;
    }

    .participant-item .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #7d8d9e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .participant-item .avatar.speaking {
      box-shadow: 0 0 0 2px #4ade80;
    }

    .participant-item .name {
      flex: 1;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .participant-item .name.you {
      color: #4ade80;
    }

    .participant-item .volume-display {
      font-size: 11px;
      color: #888;
      min-width: 35px;
      text-align: right;
    }

    .participant-item .icons {
      display: flex;
      gap: 4px;
    }

    .participant-item .icons svg {
      width: 14px;
      height: 14px;
      fill: #666;
    }

    .participant-item .icons svg.active {
      fill: #4ade80;
    }

    .participant-item .icons svg.muted {
      fill: #e94560;
    }

    /* Context Menu */
    .context-menu {
      position: fixed;
      background: #6a7a8e;
      border: 1px solid #7d8d9e;
      border-radius: 8px;
      padding: 8px 0;
      min-width: 200px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 2000;
      display: none;
    }

    .context-menu.visible {
      display: block;
    }

    .context-menu-item {
      padding: 10px 16px;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      transition: background 0.2s;
    }

    .context-menu-item:hover {
      background: #7a8a9e;
    }

    .context-menu-item svg {
      width: 16px;
      height: 16px;
      fill: #888;
    }

    .context-menu-item.danger {
      color: #e94560;
    }

    .context-menu-item.danger svg {
      fill: #e94560;
    }

    .context-menu-divider {
      height: 1px;
      background: #7d8d9e;
      margin: 8px 0;
    }

    .context-menu-volume {
      padding: 10px 16px;
    }

    .context-menu-volume label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
    }

    .context-menu-volume .volume-slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .context-menu-volume input[type="range"] {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #444;
      border-radius: 3px;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
    }

    .context-menu-volume input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #e94560;
      border-radius: 50%;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
    }

    .context-menu-volume input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #e94560;
      border-radius: 50%;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      border: none;
    }

    .context-menu-volume .volume-value {
      font-size: 12px;
      min-width: 40px;
      text-align: right;
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #7d8d9e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .chat-toggle {
      background: none;
      border: none;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      padding: 4px;
    }

    .chat-toggle svg {
      width: 20px;
      height: 20px;
      fill: #888;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-message {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chat-message .meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-message .username {
      font-size: 13px;
      font-weight: 600;
      color: #e94560;
    }

    .chat-message .time {
      font-size: 11px;
      color: #3f4b5b;
    }

    .chat-message .text {
      font-size: 14px;
      color: #1f2937;
      line-height: 1.4;
      word-wrap: break-word;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 10px;
      padding: 8px 10px;
      width: fit-content;
      max-width: 100%;
    }

    .chat-message.system {
      text-align: center;
    }

    .chat-message.system .text {
      font-size: 12px;
      color: #374151;
      font-style: italic;
      background: transparent;
      border: none;
      padding: 0;
      width: auto;
    }

    .chat-input-container {
      padding: 16px;
      border-top: 1px solid #7d8d9e;
    }

    .chat-input-wrapper {
      display: flex;
      gap: 8px;
      background: rgba(23, 34, 50, 0.78);
      border: 1px solid rgba(125, 141, 158, 0.6);
      border-radius: 8px;
      padding: 8px 12px;
    }

    .chat-input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    .chat-input::placeholder {
      color: #666;
    }

    .chat-send {
      background: #e94560;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      transition: background 0.2s;
    }

    .chat-send:hover {
      background: #ff6b8a;
    }

    .chat-send svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    /* Control Bar */
    .control-bar {
      background: rgba(67, 81, 99, 0.86);
      border: 1px solid rgba(125, 141, 158, 0.7);
      backdrop-filter: blur(6px);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .control-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: #2f3a4e;
    }

    .control-btn:hover {
      background: #38475f;
      transform: scale(1.06);
    }

    .control-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .control-btn.active {
      background: #4ade80;
    }

    .control-btn.active svg {
      fill: #000;
    }

    .control-btn.danger {
      background: #e94560;
    }

    .control-btn.danger:hover {
      background: #ff6b8a;
    }

    .control-btn.muted {
      background: #e94560;
    }

    .control-btn:disabled {
      opacity: 0.5;
      cursor: url('/assets/cursor/Cursor%20LiS/NO.cur'), not-allowed;
    }

    /* Quality Selector */
    .quality-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .quality-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: #2f3a4e;
      position: relative;
    }

    .quality-btn:hover {
      background: #38475f;
      transform: scale(1.06);
    }

    .quality-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .quality-btn .quality-badge {
      position: absolute;
      bottom: -2px;
      right: -2px;
      background: #4ade80;
      color: #000;
      font-size: 8px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 6px;
      line-height: 1.2;
    }

    .quality-dropdown {
      position: absolute;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(47, 58, 78, 0.96);
      border: 1px solid rgba(125, 141, 158, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 6px;
      display: none;
      flex-direction: column;
      gap: 2px;
      min-width: 150px;
      z-index: 200;
    }

    .quality-dropdown.visible {
      display: flex;
    }

    .quality-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #ccc;
      font-size: 13px;
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .quality-option:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .quality-option.selected {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
    }

    .quality-option .q-label {
      font-weight: 600;
    }

    .quality-option .q-detail {
      font-size: 11px;
      opacity: 0.6;
    }

    /* Stats Overlay */
    .stats-overlay {
      position: fixed;
      top: 60px;
      right: 340px;
      background: rgba(0,0,0,0.9);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      display: none;
      z-index: 100;
    }

    .stats-overlay.visible {
      display: block;
    }

    .stats-overlay .stat {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 4px;
    }

    .stats-overlay .stat .value {
      color: #4ade80;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      fill: #333;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* Username Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('/assets/Wallpaper/wallpaperflare.com_wallpaper.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      overflow: hidden;
    }

    .modal-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.15);
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal {
      background: transparent;
      padding: 40px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .profile-selection {
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .profile-option {
      cursor: url('/assets/cursor/Cursor%20LiS/Hand.cur'), pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-align: center;
    }

    .profile-option:hover {
      transform: scale(1.05);
    }

    .profile-option img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #2a2a4a;
      object-fit: cover;
      transition: border-color 0.2s;
    }

    .profile-option:hover img {
      border-color: #e94560;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
    }

    .profile-option .name {
      margin-top: 12px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    /* ---- Verbindungs-Modal ---- */
    .connection-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('/assets/Wallpaper/wallpaperflare.com_wallpaper.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1100;
    }
    .connection-modal-overlay.hidden { display: none; }
    .connection-modal-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }
    .connection-box {
      background: rgba(26, 26, 46, 0.97);
      border: 1px solid #7d8d9e;
      border-radius: 16px;
      padding: 32px 36px;
      width: 420px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .connection-box h2 {
      color: #c89b7b;
      font-size: 18px;
      text-align: center;
      margin-bottom: 4px;
    }
    .connection-box label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .connection-box input[type="text"] {
      width: 100%;
      background: #16213e;
      border: 1px solid #7d8d9e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      font-family: inherit;
      letter-spacing: 1px;
    }
    .connection-box input[type="text"]:focus { border-color: #c89b7b; }
    #connectBtn {
      width: 100%;
      padding: 14px;
      background: #c89b7b;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    #connectBtn:hover:not(:disabled) { background: #d4aa8a; transform: scale(1.02); }
    #connectBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #connectionModalStatus {
      text-align: center;
      font-size: 13px;
      min-height: 18px;
    }

    /* Audio Device Modal */
    .audio-device-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1500;
    }
    .audio-device-modal.hidden { display: none; }
    .audio-device-box {
      background: #1a1a2e;
      border: 1px solid #7d8d9e;
      border-radius: 14px;
      padding: 28px;
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .audio-device-box h3 { color: #c89b7b; font-size: 16px; margin-bottom: 4px; }
    .audio-device-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .audio-device-group select {
      width: 100%;
      background: #16213e;
      border: 1px solid #7d8d9e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 8px 12px;
      cursor: pointer;
      outline: none;
      font-family: inherit;
    }
    .audio-device-group select:focus { border-color: #c89b7b; }
    .audio-device-btns { display: flex; justify-content: flex-end; gap: 10px; }
    .audio-device-btns button {
      padding: 8px 20px; border: none; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-family: inherit;
    }
    #audioDeviceCancel { background: #2a2a3e; color: #aaa; }
    #audioDeviceApply { background: #c89b7b; color: #1a1a2e; font-weight: bold; }
  </style>
</head>
<body>
  <!-- Profile Selection Modal -->
  <div class="modal-overlay" id="usernameModal">
    <div class="modal">
      <div class="profile-selection">
        <div class="profile-option" data-name="Sarah">
          <img src="/assets/Profilbilder/images.jfif" alt="Sarah">
          <div class="name">Sarah</div>
        </div>
        <div class="profile-option" data-name="Flores">
          <img src="/assets/Profilbilder/images (1).jfif" alt="Flores">
          <div class="name">Flores</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Verbindungs-Modal (erscheint nach Profil-Wahl) -->
  <div class="connection-modal-overlay hidden" id="connectionModal">
    <div class="connection-box">
      <h2>📡 Verbindung herstellen</h2>

      <div>
        <label for="serverUrlInput">Server-Adresse</label>
        <input type="text" id="serverUrlInput" placeholder="https://lifeisstrange-production.up.railway.app">
      </div>

      <button id="connectBtn">Verbinden</button>

      <div id="connectionModalStatus"></div>
    </div>
  </div>

  <!-- PTT Badge -->
  <div id="pttBadge" style="display:none;position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:#e94560;color:#fff;padding:6px 18px;border-radius:20px;font-size:13px;font-weight:700;z-index:100;pointer-events:none;box-shadow:0 4px 20px rgba(233,69,96,.5)">🎤 Push-to-Talk</div>

  <!-- Emoji-Overlay -->
  <div id="emojiOverlay" style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50"></div>

  <!-- Header -->
  <div class="header">
    <img src="/assets/icons/Life-is-Strange-logo_2_a2-Photoroom.png" alt="Logo" class="logo">
    <div id="callTimer" style="display:none;font-size:13px;font-weight:600;color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);border-radius:20px;padding:3px 12px;font-variant-numeric:tabular-nums">00:00</div>
    <div class="connection-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Nicht verbunden</span>
    </div>
  </div>

  <!-- App Container -->
  <div class="app-container">
    <!-- Main Content -->
    <div class="main-content">
      <!-- Video Grid -->
      <div class="video-grid" id="videoGrid">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          <p>Klicke "Join" um dem Call beizutreten</p>
        </div>
      </div>

      <!-- Control Bar -->
      <div class="control-bar">
        <button class="control-btn" id="joinBtn" title="Join Call">
          <svg viewBox="0 0 24 24"><path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57-.35-.11-.74-.03-1.02.24l-2.2 2.2c-2.83-1.44-5.15-3.75-6.59-6.59l2.2-2.21c.28-.26.36-.65.25-1C8.7 6.45 8.5 5.25 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1z"/></svg>
        </button>
        <button class="control-btn" id="muteBtn" title="Mute/Unmute" disabled>
          <svg viewBox="0 0 24 24" id="muteIcon"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
        </button>
        <div class="quality-wrapper">
          <button class="quality-btn" id="qualityBtn" title="Stream Qualität">
            <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM10 17l-3.5-3.5 1.41-1.41L10 14.17l4.59-4.58L16 11l-6 6z"/></svg>
            <span class="quality-badge" id="qualityBadge">HD</span>
          </button>
          <div class="quality-dropdown" id="qualityDropdown">
            <button class="quality-option" data-quality="low">
              <span class="q-label">Niedrig</span>
              <span class="q-detail">720p 30fps</span>
            </button>
            <button class="quality-option selected" data-quality="medium">
              <span class="q-label">Mittel</span>
              <span class="q-detail">1080p 30fps</span>
            </button>
            <button class="quality-option" data-quality="high">
              <span class="q-label">Hoch</span>
              <span class="q-detail">1080p 60fps</span>
            </button>
            <button class="quality-option" data-quality="ultra">
              <span class="q-label">Ultra</span>
              <span class="q-detail">1440p 60fps</span>
            </button>
          </div>
        </div>
        <!-- Push-to-Talk -->
        <button class="control-btn" id="pttBtn" title="Push-to-Talk (Leertaste)" disabled>
          <svg viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3zm0 13c-3.31 0-6-2.69-6-6H4c0 3.53 2.61 6.43 6 6.92V21h4v-4.08c3.39-.49 6-3.39 6-6.92h-2c0 3.31-2.69 6-6 6z"/></svg>
        </button>
        <!-- Emoji Picker -->
        <div style="position:relative">
          <button class="control-btn" id="emojiBtn" title="Emoji-Reaktion">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
          </button>
          <div id="emojiPicker" style="display:none;position:absolute;bottom:56px;left:50%;transform:translateX(-50%);background:rgba(30,40,55,.97);border:1px solid rgba(125,141,158,.4);border-radius:10px;padding:8px;display:none;grid-template-columns:repeat(5,1fr);gap:5px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.5);min-width:160px"></div>
        </div>
        <button class="control-btn" id="screenBtn" title="Screen Share" disabled>
          <svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
        </button>
        <button class="control-btn danger" id="stopScreenBtn" title="Stop Screen Share" style="display: none;">
          <svg viewBox="0 0 24 24"><path d="M21.79 18l2 2H24v-2h-2.21zM1.11 2.98l1.55 1.56c-.41.37-.66.89-.66 1.48V16c0 1.1.9 2 2.01 2H0v2h18.13l2.71 2.71 1.41-1.41L2.52 1.57 1.11 2.98zM4 6.02h.13l4.95 4.93C7.94 12.07 7.31 13.52 7.31 15c0 .62.13 1.21.33 1.76L9.59 15H8v-2h3.03l6.12 6.12-.01.01L4 19.13v-13.1zM20 6v10.15l1.95 1.95c.03-.17.05-.36.05-.1V6c0-1.1-.9-2-2-2H5.4l2 2H20z"/></svg>
        </button>
        <button class="control-btn" id="statsBtn" title="Show Stats">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        </button>
        <button class="control-btn" id="queueBtn" title="Killer Queue anzeigen">
          <svg viewBox="0 0 24 24"><path d="M3 5h18v2H3V5zm0 6h12v2H3v-2zm0 6h8v2H3v-2zm14.59-4.59L16.17 14l3.59 3.59L17 20.17l-1.41-1.41L17.76 16l-2.17-2.17L17 12.41l.59.59z"/></svg>
        </button>
        <button class="control-btn danger" id="leaveBtn" title="Leave Call" disabled>
          <svg viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.68-1.36-2.66-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
        </button>
        <button class="control-btn" id="audioDeviceBtn" title="Audio Gerät wählen">
          <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0-9 9v7c0 1.1.9 2 2 2h1v-8H4v-1a8 8 0 0 1 16 0v1h-2v8h1c1.1 0 2-.9 2-2v-7a9 9 0 0 0-9-9z"/></svg>
        </button>
      </div>
    </div>

    <!-- Chat Sidebar -->
    <div class="chat-sidebar" id="chatSidebar">
      <!-- DBD Queue Panel -->
      <div style="border-bottom:1px solid #7d8d9e;padding:10px 14px">
        <div class="participants-header" style="margin-bottom:6px">
          <span style="font-size:11px;text-transform:uppercase;color:#888;letter-spacing:.5px">⚔️ DBD Killer Queue</span>
        </div>
        <div style="text-align:center">
          <div id="dbdTime" style="font-size:26px;font-weight:700;color:#c89b7b;letter-spacing:1px;min-height:32px;display:flex;align-items:center;justify-content:center">—</div>
          <div id="dbdMeta" style="font-size:11px;color:#888;margin:2px 0 6px">Frankfurt · Live</div>
          <button id="dbdRefreshBtn" onclick="fetchDbdPanel()" style="width:100%;padding:6px;background:rgba(200,155,123,.15);border:1px solid rgba(200,155,123,.3);border-radius:7px;color:#c89b7b;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit">↻ Aktualisieren</button>
        </div>
      </div>

      <!-- Participants Panel -->
      <div class="participants-panel" id="participantsPanel">
        <div class="participants-header">
          <span>Im Call</span>
          <span class="count" id="participantCount">0</span>
        </div>
        <div id="participantsList">
          <!-- Participants appear here -->
        </div>
      </div>
      
      <div class="chat-header">
        <h3>💬 Chat</h3>
      </div>
      <div class="chat-messages" id="chatMessages">
        <!-- Messages appear here -->
      </div>
      <div class="chat-input-container">
        <div class="chat-input-wrapper">
          <input type="text" class="chat-input" id="chatInput" placeholder="Nachricht schreiben..." maxlength="500">
          <button class="chat-send" id="chatSend">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="context-menu-item" id="contextFullscreen">
      <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      <span>Vollbild</span>
    </div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-volume">
      <label>Lautstärke</label>
      <div class="volume-slider-container">
        <input type="range" id="contextVolumeSlider" min="0" max="100" value="100">
        <span class="volume-value" id="contextVolumeValue">100%</span>
      </div>
    </div>
  </div>

  <!-- Stats Overlay -->
  <div class="stats-overlay" id="statsOverlay">
    <div class="stat"><span>Resolution:</span><span class="value" id="statRes">-</span></div>
    <div class="stat"><span>FPS:</span><span class="value" id="statFps">-</span></div>
    <div class="stat"><span>Bitrate:</span><span class="value" id="statBitrate">-</span></div>
    <div class="stat"><span>Latency:</span><span class="value" id="statLatency">-</span></div>
  </div>

  <!-- Audio Device Modal -->
  <div class="audio-device-modal hidden" id="audioDeviceModal">
    <div class="audio-device-box">
      <h3>Audio-Geräte-Auswahl</h3>
      <div class="audio-device-group">
        <label for="inputDevice">Eingabegerät</label>
        <select id="inputDevice"></select>
      </div>
      <div class="audio-device-group">
        <label for="outputDevice">Ausgabegerät</label>
        <select id="outputDevice"></select>
      </div>
      <div class="audio-device-btns">
        <button id="audioDeviceCancel">Abbrechen</button>
        <button id="audioDeviceApply">Anwenden</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
